temporal_functions:
  summary: "Drasi evaluates time-based conditions and detects absence of change WITHOUT a free-running wall-clock loop or external scheduler. Deadlines are DERIVED FROM SOURCE DATA; Drasi schedules a single re-evaluation per item at the computed time."
  functions:
    "drasi.trueFor(expr, duration)": "True once the condition has held continuously for the duration (a sustained condition)."
    "drasi.trueLater(expr, timestamp)": "Schedules a single deferred re-evaluation of expr at a timestamp DERIVED FROM SOURCE DATA (e.g. p1_since + 15 min). At that moment expr is checked once; if true the item enters the result set. It is NOT a free-running wall-clock condition that Drasi re-evaluates on its own schedule."
    "drasi.trueUntil(expr, timestamp)": "Condition expected to remain true until a timestamp."
  absence_of_change_pattern:
    idea: "Combine an immediate check with a deferred one so both 'deadline already passed when the query first sees the item' and 'deadline still in the future' are covered."
    example_cypher: |
      MATCH (t:tickets)
      WHERE t.severity = 'P1' AND t.owner IS NULL
        AND ( datetime.realtime() >= t.p1_since + duration({ minutes: 15 })
              OR drasi.trueLater(t.owner IS NULL, t.p1_since + duration({ minutes: 15 })) )
      RETURN t.id AS ticketId
    why_it_matters: "At the deadline the item enters the result set and reactions fire even though NO source row changed in the interval - Drasi scheduled and evaluated the deadline itself. That scheduling/sweep is work you would otherwise build and operate by hand."
  implementation: "An internal priority queue schedules per-item time-based re-evaluation at data-derived deadlines; no polling loop and no external scheduler."

