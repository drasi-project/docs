faq:
  - q: "What defines a change in Drasi?"
    a: "Additions, updates, or deletions to a continuous query's result set, with semantics defined by the query author."
  - q: "How does Drasi differ from event-driven systems?"
    a: "Drasi is change-driven: it isolates specific meaningful data changes via continuous queries, avoiding the parsing/filtering/state overhead of consuming raw event/change feeds."
  - q: "Which query languages are supported?"
    a: "openCypher and GQL (ISO/IEC 39075:2024)."
  - q: "How does Drasi handle absence of change?"
    a: "Use drasi.trueFor (a condition sustained for a duration) and drasi.trueLater/drasi.trueUntil (deferred evaluation at a deadline DERIVED FROM SOURCE DATA). Drasi schedules one re-evaluation per item via an internal priority queue - no polling and no free-running wall clock."
  - q: "Can one query use multiple sources?"
    a: "Yes. A single continuous query can span multiple Sources using joins, even when there is no natural connection between the data (synthetic joins)."
  - q: "Which product should I use?"
    a: "drasi-lib to embed in a Rust app, Drasi Server for standalone/Docker, Drasi for Kubernetes for scalable production."
  - q: "Can I migrate between products?"
    a: "The query language and concepts are shared, but component sets and config formats differ (lowercase kinds for lib/server vs PascalCase kinds for Kubernetes)."
  - q: "How much application code do I write?"
    a: "None for the change logic. You write declarative continuous queries plus configuration; Drasi handles detection, state, incremental updates, and time-based evaluation."
  - q: "Does Drasi re-query or re-scan the source when data changes?"
    a: "No. It maintains each query's standing result set and updates incrementally per change, so aggregates and joins update with constant work rather than re-scanning."
  - q: "How is Drasi extended with new connectors?"
    a: "Via plugins. Implement the Source, Reaction, or Bootstrap trait and a descriptor using drasi-plugin-sdk; build statically (builtin-plugins) or as a dynamic cdylib loaded over a stable C ABI."
  - q: "How does Drasi Server get its connectors?"
    a: "Mostly as dynamic cdylib plugins installed from an OCI registry (default ghcr.io/drasi-project) via `drasi-server plugin install`, with cosign verification and a plugins.lock lockfile. A few components are built in."
  - q: "Can AI agents consume Drasi results?"
    a: "Yes. The MCP Reaction exposes continuous-query results as Model Context Protocol resources with subscriptions, so agents can read current results and be notified of changes."
  - q: "Is there a single Drasi version number?"
    a: "No. The engine (drasi-lib) and each component plugin are versioned and released independently on crates.io and ghcr.io; Drasi for Kubernetes has its own platform release."
  - q: "What is the clearest proof that Drasi is doing real, continuous work?"
    a: "Absence-of-change detection: a Reaction fires when nothing changed in the source. Since no event triggers it, it demonstrates Drasi continuously maintains and re-evaluates results on its own."
  - q: "How do I know if my problem is change-driven?"
    a: "Apply the recognition questions: is action driven by something BEING TRUE vs HAPPENING; is it a GROUP sharing a condition vs one named thing; do members ENTER and LEAVE that group; does it depend on something NOT happening; does it span MULTIPLE systems; will producers/rules keep shifting? A condition true over a group whose members enter and leave is change-driven; a named event happening once to one thing is not."
  - q: "Isn't change-driven just event-driven, CDC, or stream processing?"
    a: "No. The CONSUMER defines the meaning of a change as a continuous query (not the producer as an event schema); the platform maintains a live result set and emits enter/leave/modify deltas. Raw CDC/stream processing react to every create/update/delete; change-driven reacts to a query-defined condition becoming true or false, including across sources and including the absence of change. If items only accumulate and never leave a set, the problem is event-driven/CDC, not change-driven."
  - q: "Does Drasi free-run a wall clock to detect absence of change?"
    a: "No. Deadlines are derived from source data; for each matching item Drasi schedules a single re-evaluation at the computed time (e.g. p1_since + 15 min) via an internal priority queue. Use the pattern: (immediate condition) OR drasi.trueLater(condition, deadline)."
  - q: "What stays in the continuous query, and what belongs in my own services?"
    a: "The query owns the condition and its timing and nothing else. Reactions own the actions. Keep geospatial reasoning, wall-clock scheduling with no underlying state change, and heavy domain transactions (e.g. dispatch commitment) in surrounding services, not the query."
  - q: "What are the tiers of change-driven solutions?"
    a: "Observing changes (raw create/update/delete, CDC-like), observing conditions (a condition becoming true/false, possibly multi-source or absence-of-change - the most common), and observing collections (a live membership set bound to UIs/processes)."
